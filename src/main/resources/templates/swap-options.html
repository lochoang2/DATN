<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chọn sân muốn đổi | Sport Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>

    <div th:replace="~{fragments/header :: header('profile')}"></div>

    <div class="container section-padding" style="margin-top: 80px;">
        <h2 class="text-center mb-4 text-white">Chọn sân muốn đổi</h2>

        <div class="alert alert-info text-center">
            Đang đổi đơn: <strong th:text="${'#' + currentBooking.id}">#123</strong> -
            <span th:text="${currentBooking.pitch.name}">Sân A</span>
            (<span th:text="${#temporals.format(currentBooking.startTime, 'HH:mm') + ' - ' + #temporals.format(currentBooking.endTime, 'HH:mm')}"></span>)
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="list-group">
                    <div th:each="pitch : ${availablePitches}" class="list-group-item list-group-item-action bg-dark text-white border-secondary d-flex justify-content-between align-items-center p-3">
                        <div>
                            <h5 class="mb-1 text-info" th:text="${pitch.name}">Sân B</h5>
                            <small th:text="${pitch.type.name() == 'PITCH_5' ? 'Sân 5 người' : 'Sân 7 người'}">Loại sân</small> -
                            <small class="text-warning" th:text="${#numbers.formatDecimal(pitch.pricePerHour, 0, 'COMMA', 0, 'POINT') + ' đ/h'}">300,000 đ/h</small>
                        </div>
                        <form th:action="@{/booking/swap}" method="post">
                            <input type="hidden" name="bookingId" th:value="${currentBooking.id}">
                            <input type="hidden" name="newPitchId" th:value="${pitch.id}">
                            <button type="submit" class="btn btn-outline-success btn-sm" onclick="return confirm('Gửi yêu cầu đổi sang sân này?');">
                                Chọn sân này
                            </button>
                        </form>
                    </div>

                    <div th:if="${availablePitches.isEmpty()}" class="text-center text-muted py-4">
                        Không có sân trống nào khác trong khung giờ này.
                    </div>
                </div>

                <div class="text-center mt-4">
                    <a th:href="@{/profile}" class="btn btn-secondary">Quay lại</a>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
