<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Khách hàng | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

    <!-- Sidebar Fragment -->
    <div th:replace="~{fragments/admin-sidebar :: sidebar('users')}"></div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom" style="border-color: #721114 !important;">
            <h2 class="m-0">Quản lý Khách hàng</h2>

            <button type="button" class="btn btn-primary btn-lg fw-bold"
                    data-bs-toggle="modal" data-bs-target="#addUserModal">
                <i class="fas fa-user-plus me-2"></i> THÊM KHÁCH HÀNG
            </button>
        </div>

        <!-- Thông báo -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Bảng danh sách User -->
        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <!-- THÊM CLASS table-scroll -->
                <div class="table-responsive table-scroll">
                    <table class="table table-dark-custom mb-0">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Họ tên</th>
                                <th>Username</th>
                                <th>Email</th>
                                <th>SĐT</th>
                                <th>Số dư ví</th>
                                <th>Điểm</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.id}">1</td>
                                <td class="fw-bold" th:text="${user.fullName}">Nguyen Van A</td>
                                <td th:text="${user.username}">user1</td>
                                <td th:text="${user.email}">email@example.com</td>
                                <td th:text="${user.phone}">0909123456</td>
                                <td class="fw-bold text-danger" th:text="${#numbers.formatDecimal(user.balance, 0, 'COMMA', 0, 'POINT') + ' đ'}">100,000 đ</td>
                                <td>
                                    <!-- ĐÃ SỬA: BỎ BADGE, CHỈ ĐỂ CHỮ ĐEN ĐẬM -->
                                    <span class="fw-bold text-dark" th:text="${user.loyaltyPoints}">5</span>
                                </td>
                                <td>
                                    <button class="btn btn-sm btn-outline-success me-1"
                                            data-bs-toggle="modal"
                                            data-bs-target="#topupModal"
                                            th:data-userid="${user.id}"
                                            th:data-username="${user.fullName}"
                                            onclick="openTopupModal(this)">
                                        <i class="fas fa-wallet"></i> Nạp tiền
                                    </button>

                                    <button class="btn btn-sm btn-outline-info me-1"
                                            data-bs-toggle="modal"
                                            data-bs-target="#editUserModal"
                                            th:data-id="${user.id}"
                                            th:data-fullname="${user.fullName}"
                                            th:data-email="${user.email}"
                                            th:data-phone="${user.phone}"
                                            onclick="openEditUserModal(this)">
                                        <i class="fas fa-edit"></i> Sửa
                                    </button>

                                    <a th:href="@{/admin/users/delete/{id}(id=${user.id})}"
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('Xóa khách hàng này? Hành động này không thể hoàn tác!');">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL THÊM KHÁCH HÀNG -->
    <div class="modal fade" id="addUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Thêm khách hàng mới</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/users/create}" method="post">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mật khẩu</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" name="fullName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Số điện thoại</label>
                            <input type="text" name="phone" class="form-control">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-primary fw-bold">Lưu</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- MODAL SỬA KHÁCH HÀNG -->
    <div class="modal fade" id="editUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Cập nhật thông tin</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/users/update}" method="post">
                    <div class="modal-body">
                        <input type="hidden" name="id" id="editUserId">
                        <div class="mb-3">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" name="fullName" id="editFullName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" id="editEmail" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Số điện thoại</label>
                            <input type="text" name="phone" id="editPhone" class="form-control">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-primary fw-bold">Cập nhật</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- MODAL NẠP TIỀN (ADMIN NẠP CHO KHÁCH) -->
    <div class="modal fade" id="topupModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-success fw-bold">Nạp tiền vào ví</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/users/topup}" method="post">
                    <div class="modal-body">
                        <input type="hidden" name="userId" id="topupUserId">
                        <!-- THÊM INPUT PAYMENT METHOD LÀ CASH -->
                        <input type="hidden" name="paymentMethod" value="CASH">

                        <p>Nạp tiền cho: <strong id="topupUsername" class="text-success"></strong></p>

                        <div class="mb-3">
                            <label class="form-label">Số tiền (VNĐ)</label>
                            <input type="number" name="amount" class="form-control" min="10000" step="10000" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-success fw-bold">Xác nhận nạp</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin.js}"></script>
    <script>
        function openTopupModal(button) {
            document.getElementById('topupUserId').value = button.getAttribute('data-userid');
            document.getElementById('topupUsername').innerText = button.getAttribute('data-username');
        }

        function openEditUserModal(button) {
            document.getElementById('editUserId').value = button.getAttribute('data-id');
            document.getElementById('editFullName').value = button.getAttribute('data-fullname');
            document.getElementById('editEmail').value = button.getAttribute('data-email');
            document.getElementById('editPhone').value = button.getAttribute('data-phone');
        }
    </script>
</body>
</html>
