<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chọn sân đổi | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-white">Chọn sân thay thế</h2>
            <a th:href="@{/admin/bookings}" class="btn btn-outline-secondary">Quay lại</a>
        </div>

        <div class="alert alert-info">
            Đang đổi booking: <strong th:text="${currentBooking.pitch.name}">Sân A</strong>
            (<span th:text="${#temporals.format(currentBooking.startTime, 'HH:mm') + ' - ' + #temporals.format(currentBooking.endTime, 'HH:mm')}">17:00 - 18:30</span>)
            <br>Khách hàng: <strong th:text="${currentBooking.user.fullName}">User</strong>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <h4 class="mb-3 text-white">Các sân trống phù hợp:</h4>

        <div class="row g-4">
            <div class="col-md-4" th:each="pitch : ${availablePitches}">
                <div class="card h-100 border-0 shadow-lg" style="background-color: #112240;">
                    <div class="card-body text-center">
                        <h5 class="card-title text-white" th:text="${pitch.name}">Sân B</h5>
                        <p class="card-text text-muted" th:text="${pitch.facility.name}">Cơ sở 1</p>
                        <p class="fw-bold text-warning" th:text="${#numbers.formatDecimal(pitch.pricePerHour, 0, 'COMMA', 0, 'POINT') + ' đ/h'}">300,000 đ/h</p>

                        <form th:action="@{/admin/bookings/swap}" method="post">
                            <input type="hidden" name="bookingId" th:value="${currentBooking.id}">
                            <input type="hidden" name="newPitchId" th:value="${pitch.id}">
                            <button type="submit" class="btn btn-outline-info w-100" onclick="return confirm('Xác nhận đổi sang sân này cho khách?');">
                                Chọn sân này
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-12 text-center" th:if="${availablePitches.isEmpty()}">
                <p class="text-muted">Rất tiếc, không có sân nào khác trống trong khung giờ này.</p>
            </div>
        </div>
    </div>

</body>
</html>
