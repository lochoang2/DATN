<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Sport Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin.css?v=2}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <!-- Sidebar Fragment -->
    <div th:replace="~{fragments/admin-sidebar :: sidebar('dashboard')}"></div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Dashboard</h2>
            <div class="user-info">
                <span>Xin chào, Admin</span>
                <!-- Đổi màu nền avatar mặc định -->
                <img src="https://ui-avatars.com/api/?name=Admin&background=721114&color=ffffff" class="rounded-circle ms-2" width="40">
            </div>
        </div>

        <!-- Stats Row -->
        <div class="row">
            <div class="col-md-4">
                <div class="stat-card d-flex justify-content-between align-items-center">
                    <div>
                        <div class="stat-title">Doanh thu tháng này</div>
                        <div class="stat-value" th:text="${#numbers.formatDecimal(monthlyRevenue, 0, 'COMMA', 0, 'POINT') + ' đ'}">0 đ</div>
                    </div>
                    <i class="fas fa-dollar-sign stat-icon"></i>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card d-flex justify-content-between align-items-center">
                    <div>
                        <div class="stat-title">Tổng số sân</div>
                        <div class="stat-value" th:text="${totalPitches}">0</div>
                    </div>
                    <i class="fas fa-flag stat-icon"></i>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card d-flex justify-content-between align-items-center">
                    <div>
                        <div class="stat-title">Booking hôm nay</div>
                        <div class="stat-value" th:text="${bookingsToday}">0</div>
                    </div>
                    <i class="fas fa-calendar-check stat-icon"></i>
                </div>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="row mt-4">
            <div class="col-lg-8">
                <div class="stat-card">
                    <h5 class="mb-4">Biểu đồ doanh thu (3 tháng gần nhất)</h5>
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="stat-card">
                    <h5 class="mb-4">Tỷ lệ đặt sân</h5>
                    <canvas id="pitchChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Inject Data from Thymeleaf to JS -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        var chartLabels = /*[[${chartLabels}]]*/ [];
        var chartData = /*[[${chartData}]]*/ [];
        var pitchTypeStats = /*[[${pitchTypeStats}]]*/ [];
        /*]]>*/
    </script>

    <script>
        // CẤU HÌNH MÀU SẮC MỚI (ĐỎ - TRẮNG - ĐEN)
        const chartColors = {
            red: '#721114',
            redLight: 'rgba(114, 17, 20, 0.1)',
            text: '#333333',
            grid: '#e0e0e0'
        };

        // Biểu đồ doanh thu
        const ctx = document.getElementById('revenueChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: chartLabels,
                datasets: [{
                    label: 'Doanh thu (VNĐ)',
                    data: chartData,
                    borderColor: chartColors.red, // Màu đường kẻ Đỏ
                    backgroundColor: chartColors.redLight, // Màu nền đỏ nhạt
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { labels: { color: chartColors.text } } // Màu chữ legend Đen
                },
                scales: {
                    y: {
                        ticks: { color: chartColors.text },
                        grid: { color: chartColors.grid }
                    },
                    x: {
                        ticks: { color: chartColors.text },
                        grid: { color: chartColors.grid }
                    }
                }
            }
        });

        // Biểu đồ tỷ lệ đặt sân
        const ctx2 = document.getElementById('pitchChart').getContext('2d');
        new Chart(ctx2, {
            type: 'doughnut',
            data: {
                labels: ['Sân 5', 'Sân 7'],
                datasets: [{
                    data: pitchTypeStats,
                    backgroundColor: ['#721114', '#333333'], // Đỏ và Đen
                    borderColor: '#ffffff', // Viền trắng
                    borderWidth: 2
                }]
            },
            options: {
                plugins: { legend: { labels: { color: chartColors.text } } }
            }
        });
    </script>

    <!-- Admin Scripts -->
    <script th:src="@{/js/admin.js}"></script>
</body>
</html>
