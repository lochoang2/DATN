<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hỗ trợ Khách hàng | Admin</title>
    <!-- THÊM META CSRF -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        /* Custom CSS cho trang Support */
        .chat-container {
            height: calc(100vh - 150px);
            background-color: #fff;
            border: 1px solid #721114; /* Viền đỏ */
            border-radius: 10px;
            overflow: hidden;
            display: flex;
        }

        /* Danh sách User bên trái */
        .user-list {
            width: 300px;
            background-color: #f9f9f9;
            border-right: 1px solid #e0e0e0;
            overflow-y: auto;
        }

        .user-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background-color 0.2s;
            color: #333;
        }

        .user-item:hover, .user-item.active {
            background-color: rgba(114, 17, 20, 0.1); /* Hover đỏ nhạt */
            border-left: 4px solid #721114;
        }

        .user-item .badge {
            background-color: #721114 !important;
        }

        /* Khung Chat bên phải */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #fff;
        }

        .chat-header {
            padding: 15px;
            background-color: #721114; /* Header đỏ */
            color: #fff;
            border-bottom: 1px solid #a3161a;
            font-weight: bold;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #f4f4f4;
        }

        .message {
            margin-bottom: 15px;
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 0.95rem;
            position: relative;
        }

        /* Tin nhắn của Khách (Trái) */
        .message.received {
            background-color: #fff;
            color: #333;
            align-self: flex-start;
            border: 1px solid #ddd;
            border-bottom-left-radius: 2px;
        }

        /* Tin nhắn của Admin (Phải) */
        .message.sent {
            background-color: #721114;
            color: #fff;
            align-self: flex-end;
            margin-left: auto; /* Đẩy sang phải */
            border-bottom-right-radius: 2px;
        }

        .chat-input {
            padding: 15px;
            background-color: #fff;
            border-top: 1px solid #e0e0e0;
        }

        .chat-input input {
            border-color: #ccc;
        }

        .chat-input button {
            background-color: #721114;
            color: #fff;
            border: none;
        }
        .chat-input button:hover {
            background-color: #a3161a;
        }
    </style>
</head>
<body>

    <!-- Sidebar Fragment -->
    <div th:replace="~{fragments/admin-sidebar :: sidebar('support')}"></div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom" style="border-color: #721114 !important;">
            <h2 class="m-0">Hỗ trợ Khách hàng</h2>
        </div>

        <div class="chat-container shadow-sm">
            <!-- Danh sách User -->
            <div class="user-list">
                <div th:each="user : ${users}"
                     class="user-item"
                     th:classappend="${selectedUser != null and selectedUser.id == user.id ? 'active' : ''}"
                     th:onclick="'window.location.href=\'/admin/support?userId=' + ${user.id} + '\''">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="fw-bold" th:text="${user.fullName}">User Name</span>
                        <!-- Badge số tin nhắn chưa đọc (nếu có logic đếm) -->
                        <!-- <span class="badge rounded-pill">2</span> -->
                    </div>
                    <small class="text-muted" th:text="${user.email}">email@example.com</small>
                </div>
                <div th:if="${users.isEmpty()}" class="p-3 text-center text-muted">
                    Chưa có khách hàng nào nhắn tin.
                </div>
            </div>

            <!-- Khu vực Chat -->
            <div class="chat-area">
                <div class="chat-header" th:if="${selectedUser != null}">
                    <i class="fas fa-user-circle me-2"></i>
                    <span th:text="${selectedUser.fullName}">User Name</span>
                    <!-- Nút kết thúc hỗ trợ -->
                    <a th:href="@{/admin/support/end/{id}(id=${selectedUser.id})}" class="btn btn-sm btn-outline-light float-end" onclick="return confirm('Kết thúc phiên hỗ trợ này?')">Kết thúc</a>
                </div>
                <div class="chat-header bg-light text-dark border-bottom" th:unless="${selectedUser != null}">
                    Vui lòng chọn khách hàng để chat
                </div>

                <div class="chat-messages" id="chatMessages">
                    <div th:if="${selectedUser != null}">
                        <!-- SỬA LOGIC HIỂN THỊ TIN NHẮN -->
                        <!-- Nếu msg.admin != null -> Admin gửi (sent) -->
                        <!-- Nếu msg.admin == null -> Khách gửi (received) -->
                        <div th:each="msg : ${messages}"
                             th:class="${'message ' + (msg.admin != null ? 'sent' : 'received')}">
                            <div th:text="${msg.content}">Nội dung tin nhắn</div>
                            <small style="font-size: 0.7rem; opacity: 0.7;"
                                   th:text="${#temporals.format(msg.timestamp, 'HH:mm dd/MM')}">10:00</small>
                        </div>
                    </div>
                </div>

                <div class="chat-input" th:if="${selectedUser != null}">
                    <!-- THÊM th:action ĐỂ LẤY URL CHÍNH XÁC -->
                    <form id="adminChatForm" th:action="@{/admin/chat-reply-ajax}" class="d-flex gap-2">
                        <input type="hidden" id="receiverId" th:value="${selectedUser.id}">
                        <input type="text" id="messageContent" class="form-control" placeholder="Nhập tin nhắn..." required autocomplete="off">
                        <button type="submit" class="btn btn-primary px-4"><i class="fas fa-paper-plane"></i></button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin.js}"></script>

    <script th:if="${selectedUser != null}">
        // CẤU HÌNH CSRF CHO AJAX
        var token = $("meta[name='_csrf']").attr("content");
        var header = $("meta[name='_csrf_header']").attr("content");

        $(document).ajaxSend(function(e, xhr, options) {
            if (token && header) {
                xhr.setRequestHeader(header, token);
            }
        });

        // Auto scroll to bottom
        var chatMessages = document.getElementById('chatMessages');
        if(chatMessages) chatMessages.scrollTop = chatMessages.scrollHeight;

        // Gửi tin nhắn AJAX
        $('#adminChatForm').submit(function(e) {
            e.preventDefault();
            var content = $('#messageContent').val();
            var userId = $('#receiverId').val();
            var url = $(this).attr('action'); // Lấy URL từ th:action

            if (!content.trim()) return;

            console.log("Sending message to: " + url); // Debug

            $.post(url, {
                userId: userId,
                content: content
            }, function(response) {
                console.log("Response: " + response); // Debug
                if (response === 'success') {
                    $('#messageContent').val('');
                    location.reload();
                } else {
                    alert('Lỗi gửi tin nhắn: ' + response);
                }
            }).fail(function(xhr, status, error) {
                console.error("Error: " + error);
                console.error("Status: " + status);
                console.dir(xhr);
                alert('Lỗi kết nối Server: ' + xhr.status);
            });
        });
    </script>
</body>
</html>
