<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Sport Rental</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
    <style>
        body {
            /* Dùng hình nền giống trang chủ */
            background-image: url('https://images.unsplash.com/photo-1529900748604-07564a03e7a6?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Thêm lớp phủ tối để làm nổi bật form */
            position: relative;
        }
        /* Lớp phủ tối */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); /* Đen mờ 60% */
            z-index: -1;
        }

        .auth-card {
            background-color: rgba(255, 255, 255, 0.95); /* Trắng mờ nhẹ */
            border: none; /* Bỏ viền đỏ, dùng bóng đổ cho đẹp */
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); /* Bóng đổ sâu hơn */
            color: #333;
            position: relative; /* Để đặt nút đóng */
            animation: fadeIn 0.5s ease-out; /* Hiệu ứng hiện ra */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Nút đóng giả lập Popup */
        .btn-close-popup {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #999;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-close-popup:hover {
            color: #721114;
            transform: rotate(90deg);
        }

        .auth-title {
            color: #721114;
            font-weight: 800;
            text-align: center;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-control {
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            color: #333;
            padding: 12px;
        }
        .form-control:focus {
            background-color: #fff;
            border-color: #721114;
            box-shadow: 0 0 0 0.25rem rgba(114, 17, 20, 0.25);
            color: #333;
        }
        .btn-auth {
            background-color: #721114;
            color: #fff;
            font-weight: 700;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-auth:hover {
            background-color: #a3161a;
            transform: translateY(-2px);
        }
        .auth-link {
            color: #721114;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-link:hover {
            text-decoration: underline;
        }
        .input-group-text {
            background-color: #eee;
            border-color: #ddd;
            color: #721114;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <!-- Nút đóng quay về trang chủ -->
        <a th:href="@{/}" class="btn-close-popup" title="Đóng"><i class="fas fa-times"></i></a>

        <h2 class="auth-title">Đăng nhập</h2>

        <div th:if="${param.error}" class="alert alert-danger text-center">
            Tên đăng nhập hoặc mật khẩu không đúng!
        </div>
        <div th:if="${param.logout}" class="alert alert-success text-center">
            Đã đăng xuất thành công.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-bold">Tên đăng nhập</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Nhập username" required autofocus>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu" required>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="remember-me" name="remember-me">
                    <label class="form-check-label" for="remember-me">Ghi nhớ tôi</label>
                </div>
                <a href="#" class="auth-link small">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn btn-auth">ĐĂNG NHẬP</button>
        </form>

        <div class="text-center mt-4">
            <p class="mb-0">Chưa có tài khoản? <a th:href="@{/register}" class="auth-link">Đăng ký ngay</a></p>
        </div>
    </div>

</body>
</html>
