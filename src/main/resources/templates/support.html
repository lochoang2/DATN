<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hỗ trợ khách hàng | Sport Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
    <style>
        .chat-box {
            height: 400px;
            overflow-y: auto;
            background-color: #112240;
            border: 1px solid #233554;
            padding: 20px;
            border-radius: 8px;
        }
        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 70%;
        }
        .message.sent {
            background-color: #64ffda;
            color: #0a192f;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }
        .message.received {
            background-color: #233554;
            color: #ccd6f6;
            margin-right: auto;
            border-bottom-left-radius: 5px;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}">SPORT<span style="color: #fff;">RENTAL</span></a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" th:href="@{/profile}">Quay lại</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="page-header">
        <div class="container text-center">
            <h1 class="section-title">Hỗ trợ trực tuyến</h1>
            <p class="text-muted">Chúng tôi luôn sẵn sàng giải đáp thắc mắc của bạn</p>
        </div>
    </header>

    <section class="section-padding">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="chat-box mb-4" id="chatBox">
                        <div th:each="msg : ${messages}"
                             th:class="${'message ' + (msg.admin == null ? 'sent' : 'received')}">
                            <div th:text="${msg.content}">Nội dung tin nhắn</div>
                            <small style="font-size: 0.7rem; opacity: 0.7;"
                                   th:text="${#temporals.format(msg.timestamp, 'HH:mm dd/MM')}">10:00</small>
                        </div>
                        <div th:if="${messages.isEmpty()}" class="text-center text-muted mt-5">
                            Chưa có tin nhắn nào. Hãy bắt đầu cuộc trò chuyện!
                        </div>
                    </div>

                    <form th:action="@{/support/send}" method="post" class="d-flex">
                        <input type="text" name="content" class="form-control me-2" placeholder="Nhập tin nhắn..." required autocomplete="off">
                        <button type="submit" class="btn btn-hero" style="padding: 10px 30px; background: var(--accent-color); color: #0a192f;">Gửi</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Auto scroll to bottom
        var chatBox = document.getElementById("chatBox");
        chatBox.scrollTop = chatBox.scrollHeight;
    </script>
</body>
</html>
